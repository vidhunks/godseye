services:
  neo4j:
    image: neo4j:5.26
    container_name: godseye-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password \"RETURN 1\" >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: godseye-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      # Dummy values for unused services (required by Settings model)
      - POSTGRES_HOST=localhost
      - POSTGRES_PORT=5432
      - POSTGRES_DB=godseye
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_HOST=localhost
      - REDIS_PORT=6379
      - RABBITMQ_HOST=localhost
      - RABBITMQ_PORT=5672
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: godseye-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  neo4j_data: